<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epika 3D - Niezawodny Silnik v1000</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffaa00; transition: opacity 0.5s; }
        #loading-bar-wrap { width: 300px; height: 6px; background: #222; margin-top: 20px; border-radius: 3px; overflow: hidden;}
        #loading-bar { width: 0%; height: 100%; background: #ffaa00; box-shadow: 0 0 15px #ffaa00; transition: width 0.2s; }
        #error-log { color: #ff3333; margin-top: 15px; font-family: monospace; max-width: 80%; text-align: center; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); color: #ffaa00; z-index: 200; }
        .panel { background: rgba(20,20,10,0.9); padding: 20px; border: 1px solid #ffaa00; border-radius: 10px; text-align: center; margin: 10px; width: 300px; }
        input, select { padding: 10px; margin: 10px 0; background: #111; border: 1px solid #ffaa00; color: white; width: 80%; border-radius: 5px; text-align: center; font-weight: bold;}
        button { padding: 12px 20px; background: transparent; color: #ffaa00; border: 2px solid #ffaa00; border-radius: 5px; cursor: pointer; text-transform: uppercase; font-weight: bold; width: 100%; margin-top: 5px; transition: 0.2s;}
        button:hover { background: #ffaa00; color: #000; }
        
        #hud { position: absolute; bottom: 20px; right: 20px; color: #ccc; background: rgba(0,0,0,0.8); padding: 15px; border-right: 4px solid #ffaa00; z-index: 100; pointer-events: none; display: none; font-family: monospace; font-size: 14px; line-height: 1.6;}
        .hidden { display: none !important; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <audio id="local-music-player" loop crossorigin="anonymous"></audio>

    <div id="loading-screen">
        <h1 style="font-size: 3em; text-shadow: 0 0 20px #ffaa00; margin-bottom: 5px;">INICJALIZACJA</h1>
        <p id="load-status">Trwa pobieranie danych ze środowiska...</p>
        <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
        <p id="error-log"></p>
        <button id="btn-force-start" class="hidden" style="width: 200px; margin-top: 30px; border-color: #00ffff; color: #00ffff;">WYMUŚ WEJŚCIE</button>
    </div>

    <div id="crosshair"></div>

    <div id="hud">
        <b>[F]</b>: Latarka<br>
        <b>[R]</b>: Ratunek (Utknięcie)<br>
        <b>[ESC]</b>: Menu Pauzy<br>
        <b>WSAD</b>: Ruch | <b>Shift</b>: Sprint
    </div>

    <div id="menu">
        <h1 style="font-size: 4em; text-shadow: 0 0 20px #ffaa00; margin-bottom: 20px; letter-spacing: 5px;">BACKROOMS</h1>
        
        <div id="login-ui">
            <input type="text" id="my-nick" placeholder="TWÓJ NICK" value="Eksplorator">
            <div style="display:flex; flex-wrap: wrap; justify-content: center;">
                <div class="panel">
                    <h3>ZAŁÓŻ SERWER</h3>
                    <button id="btn-create">GENERUJ KOD</button>
                    <div id="my-code-display" style="font-size:28px; color:#ff3333; margin:15px 0; font-weight:bold;"></div>
                    <button id="btn-start-game" class="hidden" style="color:#00ffff; border-color:#00ffff;">WEJDŹ DO GRY</button>
                </div>
                <div class="panel">
                    <h3>DOŁĄCZ</h3>
                    <input type="text" id="join-code" placeholder="WPISZ KOD" maxlength="5" style="text-transform: uppercase; font-size: 20px;">
                    <button id="btn-join">POŁĄCZ</button>
                </div>
            </div>
            <button id="btn-offline" style="width:250px; margin-top:30px; border-color:#888; color:#888;">GRAJ OFFLINE (SOLO)</button>
        </div>

        <div id="pause-ui" class="hidden">
            <div class="panel">
                <button id="btn-resume" style="background: #ffaa00; color: #000;">WZNÓW GRĘ</button>
                <h3 style="color:#00ffff; margin-top:30px;">Odtwarzacz (Folder /music/)</h3>
                <select id="music-select"></select>
                <button id="btn-play-music" style="border-color:#00ffff; color:#00ffff;">GRAJ DLA WSZYSTKICH</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // =======================================================
        // TWOJA MUZYKA (Zmień na swoje pliki z folderu na GitHubie)
        // =======================================================
        const myMusicFiles = ["lady_gaga.mp3", "ambient.mp3"]; 
        const musicSelect = document.getElementById('music-select');
        myMusicFiles.forEach(f => { let o = document.createElement('option'); o.value=f; o.text=f; musicSelect.appendChild(o); });
        const musicPlayer = document.getElementById('local-music-player');

        // --- ZMIENNE GLOBALNE ---
        let peer = null, conn = null, myNick = "Eksplorator", isGameRunning = false;
        let remotePlayerGroup = new THREE.Group(), remoteAvatarLoaded = false;
        const mapColliders = [];

        // --- ULTRA STABILNY RENDERER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.015);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.0)); // Blokada lagów
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Latarka doczepiona do kamery
        const flashlight = new THREE.SpotLight(0xfff5b5, 3, 40, Math.PI/4, 0.5, 1);
        flashlight.castShadow = true;
        camera.add(flashlight);
        flashlight.target.position.set(0, 0, -1);
        camera.add(flashlight.target);
        scene.add(camera);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1); 
        scene.add(ambientLight);

        // Referencyjny sześcian na środku (żebyś wiedział gdzie jest punkt 0,0,0)
        const centerCube = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({color: 0x00ffff}));
        centerCube.position.set(0, 1, 0);
        scene.add(centerCube);

        // --- SYSTEM ŁADOWANIA Z ZABEZPIECZENIAMI ---
        const manager = new THREE.LoadingManager();
        const loader = new GLTFLoader(manager);
        let mapLoadedSuccess = false;
        
        manager.onProgress = (url, loaded, total) => {
            let p = (loaded/total)*100;
            document.getElementById('loading-bar').style.width = p + '%';
            document.getElementById('load-status').innerText = `Pobieranie plików: ${Math.round(p)}%`;
        };

        function showMenu() {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
                // Odpal muzykę "lady" jeśli istnieje
                let lady = myMusicFiles.find(f => f.toLowerCase().includes('lady'));
                if(lady) { musicPlayer.src = './music/'+lady; musicPlayer.play().catch(()=>{}); }
            }, 500);
        }

        manager.onLoad = () => {
            if(mapLoadedSuccess) showMenu();
        };

        // --- AWARYJNA MAPA (Jeśli GitHub zablokuje model) ---
        function buildProceduralBackrooms() {
            document.getElementById('error-log').innerHTML += "<br/>Generowanie mapy zastępczej...";
            const wallMat = new THREE.MeshStandardMaterial({color: 0x887722, roughness: 0.9, side: THREE.DoubleSide});
            const floorMat = new THREE.MeshStandardMaterial({color: 0x332200, roughness: 0.8});
            
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
            scene.add(floor); mapColliders.push(floor);

            for(let i=0; i<40; i++) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.5), wallMat);
                wall.position.set((Math.random()-0.5)*40, 2, (Math.random()-0.5)*40);
                wall.rotation.y = Math.random() > 0.5 ? Math.PI/2 : 0;
                if (wall.position.length() > 5) { // Omijamy srodek
                    wall.castShadow = true; wall.receiveShadow = true;
                    scene.add(wall); mapColliders.push(wall);
                }
            }
            camera.position.set(0, 1.5, 0);
            mapLoadedSuccess = true;
            document.getElementById('btn-force-start').classList.remove('hidden');
        }

        // --- ŁADOWANIE MODELU GLTF ---
        console.log("Rozpoczynam pobieranie modelu: ./models/backrooms/scene.gltf");
        
        loader.load('./models/backrooms/scene.gltf', (gltf) => {
            const map = gltf.scene;
            
            // CENTROWANIE I SKALOWANIE MAPY
            const box = new THREE.Box3().setFromObject(map);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3()).length();
            
            // Przesuwamy mapę tak, aby jej środek był na (0,0,0)
            map.position.x += (map.position.x - center.x);
            map.position.y += (map.position.y - center.y);
            map.position.z += (map.position.z - center.z);
            
            if (size < 5) map.scale.setScalar(20); // Jeśli miniaturka to powiększ

            map.traverse(n => { 
                if(n.isMesh) { 
                    n.receiveShadow = true; n.castShadow = true; 
                    if(n.material) n.material.side = THREE.DoubleSide; // Wymuszenie podwójnych ścian
                    mapColliders.push(n); 
                }
            });
            scene.add(map);
            camera.position.set(0, 1.5, 0);
            mapLoadedSuccess = true;
            console.log("Mapa wczytana idealnie!");
        }, undefined, (error) => {
            console.error("BŁĄD WGRYWANIA MAPY:", error);
            document.getElementById('error-log').innerText = "Nie znaleziono pliku ./models/backrooms/scene.gltf! Sprawdź wielkość liter na GitHubie.";
            buildProceduralBackrooms(); // Ratunek!
        });

        document.getElementById('btn-force-start').addEventListener('click', showMenu);

        // --- MULTIPLAYER ---
        function setupRemote(nick) {
            if(remoteAvatarLoaded) return;
            // Nick Sprite
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64; ctx.fillStyle = "#ffaa00"; ctx.font = "bold 32px Arial"; ctx.textAlign = "center"; ctx.fillText(nick, 128, 45);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(canvas)})); 
            sprite.position.y = 2.2; sprite.scale.set(3,0.75,1);
            remotePlayerGroup.add(sprite);

            // Awaryjny model gracza (Zawsze zadziała)
            const playerMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.8, 8), new THREE.MeshStandardMaterial({color:0xffaa00, wireframe:true}));
            playerMesh.position.y = 0.9;
            remotePlayerGroup.add(playerMesh);
            scene.add(remotePlayerGroup);
            remoteAvatarLoaded = true;

            // Próba wczytania ładnego modelu
            loader.load('./models/avatar/scene.gltf', (gltf) => {
                const av = gltf.scene; av.position.y = 0; 
                av.traverse(n => { if(n.isMesh) { n.castShadow=true; n.receiveShadow=true; }});
                remotePlayerGroup.remove(playerMesh); 
                remotePlayerGroup.add(av);
            }, undefined, (e) => console.log("Brak ładnego avatara, zostaje awaryjny."));
        }

        // --- UI ACTIONS ---
        function start() {
            isGameRunning = true; 
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            controls.lock(); 
            if(conn && conn.open) conn.send({type:'init', nick:myNick});
        }

        document.getElementById('btn-create').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value;
            const code = Math.random().toString(36).substring(2,7).toUpperCase();
            peer = new Peer(code);
            peer.on('open', (id) => { 
                document.getElementById('my-code-display').innerText = id;
                document.getElementById('btn-start-game').classList.remove('hidden');
                document.getElementById('btn-create').classList.add('hidden');
            });
            peer.on('connection', c => { conn = c; conn.on('data', handleData); });
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value;
            const code = document.getElementById('join-code').value.toUpperCase();
            if(code.length !== 5) return;
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(code);
                conn.on('open', () => { conn.on('data', handleData); setTimeout(start, 500); });
            });
        });

        document.getElementById('btn-offline').addEventListener('click', start);
        document.getElementById('btn-start-game').addEventListener('click', start);
        document.getElementById('btn-resume').addEventListener('click', () => { 
            document.getElementById('menu').style.display = 'none'; 
            controls.lock(); 
        });

        document.getElementById('btn-play-music').addEventListener('click', () => {
            const f = musicSelect.value; if(!f) return;
            musicPlayer.src = './music/'+f; musicPlayer.play();
            if(conn && conn.open) conn.send({type:'music', file:f});
            document.getElementById('menu').style.display = 'none'; 
            controls.lock();
        });

        function handleData(d) {
            if(d.type === 'init') { setupRemote(d.nick); if(peer && peer.id && peer.id.length === 5) conn.send({type:'initReply', nick:myNick}); }
            if(d.type === 'initReply') { setupRemote(d.nick); }
            if(d.type === 'move' && remoteAvatarLoaded) { remotePlayerGroup.position.set(d.x, d.y, d.z); remotePlayerGroup.rotation.y = d.ry; }
            if(d.type === 'music') { musicPlayer.src = './music/'+d.file; musicPlayer.play(); }
        }

        // --- STEROWANIE ---
        const controls = new PointerLockControls(camera, document.body);
        
        // NAPRAWIONY ESC: Idealnie otwiera pauzę
        controls.addEventListener('unlock', () => {
            if(isGameRunning) {
                document.getElementById('menu').style.display = 'flex';
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('pause-ui').classList.remove('hidden');
            }
        });

        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let moveF = false, moveB = false, moveL = false, moveR = false, isSprinting = false;

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyF') flashlight.visible = !flashlight.visible;
            if(e.code === 'KeyR' && isGameRunning) {
                // Przycisk ratunkowy
                camera.position.set(0, 2, 0);
                velocity.set(0,0,0);
            }
            switch(e.code) { case 'KeyW': moveF = true; break; case 'KeyS': moveB = true; break; case 'KeyA': moveL = true; break; case 'KeyD': moveR = true; break; case 'ShiftLeft': isSprinting = true; break; }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) { case 'KeyW': moveF = false; break; case 'KeyS': moveB = false; break; case 'KeyA': moveL = false; break; case 'KeyD': moveR = false; break; case 'ShiftLeft': isSprinting = false; break; }
        });

        // Fizyka kolizji Raycast
        const moveRaycaster = new THREE.Raycaster();
        function checkWallCollision(dir) {
            const origin = camera.position.clone(); origin.y -= 0.5; 
            const rotationMatrix = new THREE.Matrix4().extractRotation(camera.matrix);
            const moveDirection = dir.clone().applyMatrix4(rotationMatrix).normalize();
            moveRaycaster.set(origin, moveDirection);
            const intersects = moveRaycaster.intersectObjects(mapColliders, false);
            return (intersects.length > 0 && intersects[0].distance < 0.6);
        }

        // --- PĘTLA ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if(controls.isLocked) {
                direction.z = Number(moveF) - Number(moveB);
                direction.x = Number(moveR) - Number(moveL);
                direction.normalize();

                const speed = isSprinting ? 20.0 : 10.0;
                velocity.z -= direction.z * speed * delta;
                velocity.x -= direction.x * speed * delta;
                velocity.x *= 0.85; // Tarcie
                velocity.z *= 0.85;

                // Bezpieczne przesuwanie (sprawdza ściany)
                if (velocity.x !== 0 || velocity.z !== 0) {
                    if(!checkWallCollision(new THREE.Vector3(0, 0, Math.sign(velocity.z)))) controls.moveForward(-velocity.z * delta); else velocity.z = 0; 
                    if(!checkWallCollision(new THREE.Vector3(Math.sign(velocity.x), 0, 0))) controls.moveRight(-velocity.x * delta); else velocity.x = 0; 
                }

                // Grawitacja na mapie (żeby nie latać nad podłogą)
                const downRay = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0));
                const floorHits = downRay.intersectObjects(mapColliders);
                if(floorHits.length > 0) {
                    const dist = floorHits[0].distance;
                    if(dist < 1.4) camera.position.y += (1.5 - dist); // Wchodzenie na schody
                    else if(dist > 1.6 && dist < 3.0) camera.position.y -= 5 * delta; // Spadanie
                }

                if(conn && conn.open) conn.send({type:'move', x:camera.position.x, y:camera.position.y - 1.5, z:camera.position.z, ry:camera.rotation.y});
            }
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
