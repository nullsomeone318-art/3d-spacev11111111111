<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epika 3D - Naprawione Bugi & Animacje</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: rgba(0, 255, 255, 0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none;
            box-shadow: 0 0 10px #00ffff;
        }

        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(10, 10, 20, 0.9); backdrop-filter: blur(10px); color: #00ffff; z-index: 200;
        }

        .panel {
            background: rgba(0,0,0,0.6); padding: 20px; border: 1px solid #00ffff;
            border-radius: 10px; text-align: center; margin: 10px; box-shadow: 0 0 20px rgba(0,255,255,0.2);
            width: 300px;
        }

        .panels-container { display: flex; flex-wrap: wrap; justify-content: center; }

        input {
            padding: 10px; font-size: 14px; margin: 10px 0; background: #111;
            border: 1px solid #00ffff; color: white; text-align: center; width: 85%; border-radius: 5px;
        }

        #join-code-input { text-transform: uppercase; font-size: 20px; font-weight: bold; letter-spacing: 2px; }

        button {
            padding: 10px 20px; font-size: 14px; background: transparent; color: #00ffff;
            border: 2px solid #00ffff; border-radius: 5px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; margin-top: 5px; width: 100%; font-weight: bold;
        }
        button:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }

        #my-code-display { font-size: 32px; color: #ff00ff; font-weight: bold; margin: 10px 0; user-select: text; background: #222; padding: 15px; border-radius: 5px; letter-spacing: 4px;}
        .hidden { display: none !important; }
        
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.5); padding: 10px; border-left: 3px solid #00ffff; z-index: 100; pointer-events: none; display: none;
        }

        #music-status {
            position: absolute; top: 20px; right: 20px; color: #ff00ff; font-weight: bold;
            background: rgba(0,0,0,0.5); padding: 10px; border-right: 3px solid #ff00ff; z-index: 100; display: none;
        }
        
        #yt-player { position: absolute; top: -9999px; left: -9999px; } 
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="yt-player"></div>
    <div id="crosshair"></div>
    <div id="hud">
        <b>LPM</b>: Zbuduj Blok<br>
        <b>WSAD</b>: Ruch | <b>Spacja</b>: Skok<br>
        <b>ESC</b>: Menu / Zmień Muzykę
    </div>
    <div id="music-status">Muzyka: Brak</div>

    <div id="menu">
        <h1 style="margin-bottom: 5px; font-size: 3em; text-shadow: 0 0 20px #00ffff;">EPIKA 3D</h1>
        <p style="color: #aaa; margin-bottom: 20px;">Zbudujcie to i słuchajcie razem</p>
        
        <input type="text" id="my-nick" placeholder="TWÓJ NICK" value="Gracz">

        <div class="panels-container">
            <div class="panel" id="host-panel">
                <h3>STWÓRZ MAPĘ</h3>
                <button id="btn-create">Generuj Krótki Kod</button>
                <div id="code-container" class="hidden">
                    <p style="font-size: 12px; color: #aaa;">Podaj ten kod znajomemu:</p>
                    <div id="my-code-display"></div>
                    <button id="btn-start-host">Rozpocznij Grę</button>
                </div>
            </div>

            <div class="panel" id="join-panel">
                <h3>DOŁĄCZ DO GRY</h3>
                <input type="text" id="join-code-input" placeholder="Wpisz 5-znakowy kod" maxlength="5"><br>
                <button id="btn-join">Dołącz i Graj</button>
            </div>

            <div class="panel" id="music-panel" style="border-color: #ff00ff; box-shadow: 0 0 20px rgba(255,0,255,0.2);">
                <h3 style="color: #ff00ff;">ODTWARZACZ YT (DJ)</h3>
                <p style="font-size: 12px; color: #aaa;">Wklej link do piosenki z YouTube</p>
                <input type="text" id="yt-url-input" placeholder="np. https://youtu.be/dQw4w9WgXcQ"><br>
                <button id="btn-play-music" style="border-color: #ff00ff; color: #ff00ff;">Graj dla wszystkich!</button>
            </div>
        </div>
        <p id="status-msg" style="margin-top: 15px; color: #00ffff; font-weight: bold;"></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- YOUTUBE API ---
        let ytPlayer;
        let isYtReady = false;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', {
                height: '10', width: '10', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0 },
                events: { 'onReady': () => { isYtReady = true; } }
            });
        };

        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // --- ZMIENNE GLOBALNE I SIECIOWE ---
        let peer = null;
        let conn = null;
        let myNick = "Gracz";
        let isHost = false;
        
        let remotePlayerGroup = new THREE.Group();
        let remotePlayerNickSprite = null;
        let remoteAvatarLoaded = false;
        let remoteMixer = null; // NOWOŚĆ: Mikser animacji dla drugiego gracza
        
        const uiMenu = document.getElementById('menu');
        const uiHud = document.getElementById('hud');
        const uiMusicStatus = document.getElementById('music-status');
        const uiCrosshair = document.getElementById('crosshair');
        const statusMsg = document.getElementById('status-msg');

        function generateShortCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 5; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // --- SCENA 3D ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.03);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x4444ff, 0.6);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- ŚRODOWISKO I KOLIZJE ---
        const collidableObjects = [];
        const buildableSurfaces = [];

        const floorMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.8 })
        );
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);
        buildableSurfaces.push(floorMesh);

        const grid = new THREE.GridHelper(200, 100, 0x00ffff, 0x111133);
        grid.position.y = 0.01;
        scene.add(grid);

        function addSolidObject(mesh) {
            scene.add(mesh);
            buildableSurfaces.push(mesh);
            mesh.updateMatrixWorld();
            const box = new THREE.Box3().setFromObject(mesh);
            collidableObjects.push(box);
        }

        const monMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
        const monGeo = new THREE.BoxGeometry(2, 10, 2);
        for(let i=0; i<15; i++) {
            const pillar = new THREE.Mesh(monGeo, monMat);
            pillar.position.set((Math.random() - 0.5) * 60, 5, (Math.random() - 0.5) * 60);
            if(pillar.position.length() > 10) { 
                pillar.castShadow = true; pillar.receiveShadow = true;
                addSolidObject(pillar);
            }
        }

        // --- SYSTEM MULTIPLAYER ---
        function createTextSprite(message) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            context.font = "Bold 30px Arial";
            context.fillStyle = "rgba(0,0,0,0.5)";
            context.fillRect(0, 0, 256, 64);
            context.fillStyle = "#00ffff";
            context.textAlign = "center";
            context.fillText(message, 128, 40);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(4, 1, 1);
            return sprite;
        }

        function setupRemotePlayer(nick) {
            remotePlayerNickSprite = createTextSprite(nick);
            remotePlayerNickSprite.position.y = 2.5;
            remotePlayerGroup.add(remotePlayerNickSprite);
            scene.add(remotePlayerGroup);

            const loader = new GLTFLoader();
            loader.load('./models/avatar/scene.gltf', (gltf) => {
                const avatar = gltf.scene;
                avatar.scale.set(1, 1, 1);
                avatar.position.y = -1;
                avatar.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                
                remotePlayerGroup.add(avatar);
                remoteAvatarLoaded = true;

                // NOWOŚĆ: System odtwarzania animacji z pliku GLTF
                if (gltf.animations && gltf.animations.length > 0) {
                    remoteMixer = new THREE.AnimationMixer(avatar);
                    const action = remoteMixer.clipAction(gltf.animations[0]); // Odpala pierwszą animację (np. Idle)
                    action.play();
                }
            });
        }

        function handleNetworkData(data) {
            if(data.type === 'init') {
                setupRemotePlayer(data.nick);
                if(!isHost && data.blocks) {
                    data.blocks.forEach(b => placeBlock(new THREE.Vector3(b.x, b.y, b.z), false));
                }
            }
            if(data.type === 'move' && remoteAvatarLoaded) {
                remotePlayerGroup.position.set(data.x, data.y, data.z);
                remotePlayerGroup.rotation.y = data.rotY;
            }
            if(data.type === 'build') {
                placeBlock(new THREE.Vector3(data.x, data.y, data.z), false);
            }
            if(data.type === 'music') {
                if(isYtReady && ytPlayer.loadVideoById) {
                    ytPlayer.loadVideoById(data.videoId);
                    uiMusicStatus.innerText = "Muzyka: Odtwarzanie...";
                }
            }
        }

        function startGame() {
            uiMenu.style.display = 'none';
            uiHud.style.display = 'block';
            uiMusicStatus.style.display = 'block';
            uiCrosshair.style.display = 'block';
            controls.lock();
            if(conn && conn.open) conn.send({ type: 'init', nick: myNick, blocks: builtBlocksNetwork });
        }

        document.getElementById('btn-create').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value || "Host";
            const shortCode = generateShortCode(); 
            peer = new Peer(shortCode); 
            
            statusMsg.innerText = "Trwa generowanie serwera...";
            peer.on('open', (id) => {
                document.getElementById('btn-create').classList.add('hidden');
                document.getElementById('code-container').classList.remove('hidden');
                document.getElementById('my-code-display').innerText = id;
                statusMsg.innerText = "Oczekiwanie na gracza...";
                isHost = true;
            });
            
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    statusMsg.innerText = "Błąd: Kod zajęty. Kliknij 'Generuj' jeszcze raz.";
                    peer.destroy();
                } else {
                    statusMsg.innerText = "Wystąpił błąd sieci.";
                }
            });

            peer.on('connection', (connection) => {
                conn = connection;
                statusMsg.innerText = "Gracz połączony! Możesz zacząć grę.";
                conn.on('data', handleNetworkData);
            });
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value || "Klient";
            const code = document.getElementById('join-code-input').value.trim().toUpperCase();
            if(code.length !== 5) { statusMsg.innerText = "Kod musi mieć dokładnie 5 znaków!"; return; }
            
            peer = new Peer();
            statusMsg.innerText = "Łączenie z serwerem...";
            peer.on('open', () => {
                conn = peer.connect(code);
                conn.on('open', () => {
                    statusMsg.innerText = "Połączono! Zaczynamy...";
                    conn.on('data', handleNetworkData);
                    setTimeout(startGame, 1000);
                });
                conn.on('error', (err) => { statusMsg.innerText = "Błąd połączenia! Zły kod?"; });
            });
        });

        document.getElementById('btn-start-host').addEventListener('click', startGame);

        document.getElementById('btn-play-music').addEventListener('click', () => {
            const url = document.getElementById('yt-url-input').value;
            const videoId = getYouTubeID(url);
            
            if(videoId) {
                if(isYtReady && ytPlayer.loadVideoById) {
                    ytPlayer.loadVideoById(videoId);
                    uiMusicStatus.innerText = "Muzyka: Twój wybór!";
                }
                if(conn && conn.open) conn.send({ type: 'music', videoId: videoId });
                if(scene.children.length > 0) controls.lock(); 
            } else {
                alert("Nieprawidłowy link YouTube! Wklej poprawny adres URL.");
            }
        });

        // --- BUDOWANIE (RAYCASTER) I NAPRAWA BUGÓW ---
        const raycaster = new THREE.Raycaster();
        const blockGeo = new THREE.BoxGeometry(2, 2, 2);
        const blockMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
        const builtBlocksNetwork = [];

        function placeBlock(position, sendToNetwork = true) {
            const block = new THREE.Mesh(blockGeo, blockMat);
            block.position.copy(position);
            block.castShadow = true; block.receiveShadow = true;
            addSolidObject(block);

            if(sendToNetwork) {
                builtBlocksNetwork.push({x: position.x, y: position.y, z: position.z});
                if (conn && conn.open) conn.send({ type: 'build', x: position.x, y: position.y, z: position.z });
            }
        }

        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked || e.button !== 0) return;
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(buildableSurfaces, false);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                const pos = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(1));
                pos.x = Math.floor(pos.x / 2) * 2 + 1; 
                pos.y = Math.floor(pos.y / 2) * 2 + 1; 
                pos.z = Math.floor(pos.z / 2) * 2 + 1;

                // NOWOŚĆ: Blokada zatrzaskiwania w blokach
                const newBlockBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(2, 2, 2));
                const myPlayerBox = new THREE.Box3().setFromCenterAndSize(
                    new THREE.Vector3(controls.getObject().position.x, controls.getObject().position.y - 1, controls.getObject().position.z),
                    new THREE.Vector3(1.1, 2.1, 1.1) // Delikatnie większy box na wypadek milimetrowych pomyłek
                );

                if (newBlockBox.intersectsBox(myPlayerBox)) {
                    console.log("Nie możesz postawić bloku w sobie!");
                    return; // Przerywamy budowanie w tym miejscu
                }

                placeBlock(pos, true);
            }
        });

        // --- STEROWANIE ---
        const controls = new PointerLockControls(camera, document.body);
        controls.addEventListener('unlock', () => {
            uiMenu.style.display = 'flex'; uiHud.style.display = 'none'; uiCrosshair.style.display = 'none';
        });

        camera.position.set(0, 2, 5);
        const velocity = new THREE.Vector3(); const direction = new THREE.Vector3();
        let moveF = false, moveB = false, moveL = false, moveR = false, canJump = false;

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveF = true; break; case 'KeyS': moveB = true; break;
                case 'KeyA': moveL = true; break; case 'KeyD': moveR = true; break;
                case 'Space': if(canJump){ velocity.y += 12; canJump = false; } break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveF = false; break; case 'KeyS': moveB = false; break;
                case 'KeyA': moveL = false; break; case 'KeyD': moveR = false; break;
            }
        });

        const clock = new THREE.Clock(); const playerBox = new THREE.Box3();

        function checkCollision(predictedPos) {
            playerBox.setFromCenterAndSize(
                new THREE.Vector3(predictedPos.x, predictedPos.y - 1, predictedPos.z),
                new THREE.Vector3(1, 2, 1)
            );
            for(let box of collidableObjects) {
                if(playerBox.intersectsBox(box)) return true;
            }
            return false;
        }

        // --- PĘTLA GRY ---
        let lastSendTime = 0;
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // NOWOŚĆ: Aktualizacja miksera animacji drugiego gracza
            if (remoteMixer) {
                remoteMixer.update(delta);
            }

            if (controls.isLocked) {
                direction.z = Number(moveF) - Number(moveB); direction.x = Number(moveR) - Number(moveL);
                direction.normalize();

                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta; velocity.y -= 30.0 * delta; 
                if (moveF || moveB) velocity.z -= direction.z * 50.0 * delta;
                if (moveL || moveR) velocity.x -= direction.x * 50.0 * delta;

                const currPos = controls.getObject().position.clone();

                const nextPosX = currPos.clone(); nextPosX.x += (velocity.x * delta) * -1;
                if(!checkCollision(nextPosX)) controls.moveRight(-velocity.x * delta); else velocity.x = 0;

                const nextPosZ = controls.getObject().position.clone(); nextPosZ.z += (velocity.z * delta) * -1;
                if(!checkCollision(nextPosZ)) controls.moveForward(-velocity.z * delta); else velocity.z = 0;

                controls.getObject().position.y += velocity.y * delta;
                if (controls.getObject().position.y < 2) { velocity.y = 0; controls.getObject().position.y = 2; canJump = true; }

                if (conn && conn.open && performance.now() - lastSendTime > 50) {
                    const pos = controls.getObject().position;
                    conn.send({ type: 'move', x: pos.x, y: pos.y, z: pos.z, rotY: camera.rotation.y });
                    lastSendTime = performance.now();
                }
            }
            
            if(remotePlayerNickSprite) remotePlayerNickSprite.quaternion.copy(camera.quaternion);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
