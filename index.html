<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epika 3D - Multi & Budowanie</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: rgba(0, 255, 255, 0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none;
            box-shadow: 0 0 10px #00ffff;
        }

        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(10, 10, 20, 0.9); backdrop-filter: blur(10px); color: #00ffff; z-index: 200;
        }

        .panel {
            background: rgba(0,0,0,0.6); padding: 30px; border: 1px solid #00ffff;
            border-radius: 10px; text-align: center; margin: 10px; box-shadow: 0 0 20px rgba(0,255,255,0.2);
            width: 300px;
        }

        .panels-container { display: flex; flex-wrap: wrap; justify-content: center; }

        input {
            padding: 10px; font-size: 16px; margin: 10px 0; background: #111;
            border: 1px solid #00ffff; color: white; text-align: center; width: 80%; border-radius: 5px;
        }

        button {
            padding: 12px 25px; font-size: 16px; background: transparent; color: #00ffff;
            border: 2px solid #00ffff; border-radius: 5px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s; margin-top: 10px; width: 100%; font-weight: bold;
        }
        button:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }

        #my-code-display { font-size: 20px; color: #ff00ff; font-weight: bold; margin: 15px 0; user-select: text; background: #222; padding: 10px; border-radius: 5px;}
        .hidden { display: none !important; }
        
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.5); padding: 10px; border-left: 3px solid #00ffff; z-index: 100; pointer-events: none; display: none;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="hud">
        <b>LPM</b>: Zbuduj Blok<br>
        <b>WSAD</b>: Ruch | <b>Spacja</b>: Skok<br>
        <b>ESC</b>: Zostaw grę / Kursor
    </div>

    <div id="menu">
        <h1 style="margin-bottom: 5px; font-size: 3em; text-shadow: 0 0 20px #00ffff;">EPIKA 3D</h1>
        <p style="color: #aaa; margin-bottom: 30px;">Zbudujcie to razem</p>
        
        <input type="text" id="my-nick" placeholder="TWÓJ NICK" value="Gracz">

        <div class="panels-container">
            <div class="panel" id="host-panel">
                <h3>STWÓRZ MAPĘ</h3>
                <button id="btn-create">Generuj Kod Serwera</button>
                <div id="code-container" class="hidden">
                    <p style="font-size: 14px; color: #aaa;">Podaj ten kod znajomemu:</p>
                    <div id="my-code-display"></div>
                    <button id="btn-start-host">Rozpocznij Grę</button>
                </div>
            </div>

            <div class="panel" id="join-panel">
                <h3>DOŁĄCZ DO GRY</h3>
                <input type="text" id="join-code-input" placeholder="Wklej kod serwera"><br>
                <button id="btn-join">Dołącz i Graj</button>
            </div>
        </div>
        <p id="status-msg" style="margin-top: 20px; color: #ff00ff; font-weight: bold;"></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. ZMIENNE GLOBALNE I SIECIOWE ---
        let peer = null;
        let conn = null;
        let myNick = "Gracz";
        let isHost = false;
        
        // Zmienne do drugiego gracza
        let remotePlayerGroup = new THREE.Group();
        let remotePlayerNickSprite = null;
        let remoteAvatarLoaded = false;
        
        const uiMenu = document.getElementById('menu');
        const uiHud = document.getElementById('hud');
        const uiCrosshair = document.getElementById('crosshair');
        const statusMsg = document.getElementById('status-msg');

        // --- 2. KONFIGURACJA SCENY 3D ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.03);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x4444ff, 0.6);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3. ŚRODOWISKO I KOLIZJE ---
        const collidableObjects = []; // Tablica skrzynek kolizyjnych (Box3)
        const buildableSurfaces = []; // Obiekty dla raycastera (budowanie)

        // Podłoga
        const floorMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.8 })
        );
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);
        buildableSurfaces.push(floorMesh);

        const grid = new THREE.GridHelper(200, 100, 0x00ffff, 0x111133);
        grid.position.y = 0.01;
        scene.add(grid);

        // Funkcja do dodawania obiektów z kolizją
        function addSolidObject(mesh) {
            scene.add(mesh);
            buildableSurfaces.push(mesh);
            mesh.updateMatrixWorld();
            const box = new THREE.Box3().setFromObject(mesh);
            collidableObjects.push(box);
        }

        // Monolity na mapie
        const monMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
        const monGeo = new THREE.BoxGeometry(2, 10, 2);
        for(let i=0; i<15; i++) {
            const pillar = new THREE.Mesh(monGeo, monMat);
            pillar.position.set((Math.random() - 0.5) * 60, 5, (Math.random() - 0.5) * 60);
            if(pillar.position.length() > 10) { // Nie na środku
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                addSolidObject(pillar);
            }
        }

        // --- 4. SYSTEM MULTIPLAYER (PEERJS) ---
        function createTextSprite(message) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            context.font = "Bold 30px Arial";
            context.fillStyle = "rgba(0,0,0,0.5)";
            context.fillRect(0, 0, 256, 64);
            context.fillStyle = "#00ffff";
            context.textAlign = "center";
            context.fillText(message, 128, 40);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(4, 1, 1);
            return sprite;
        }

        function setupRemotePlayer(nick) {
            remotePlayerNickSprite = createTextSprite(nick);
            remotePlayerNickSprite.position.y = 2.5; // Nad głową
            remotePlayerGroup.add(remotePlayerNickSprite);
            scene.add(remotePlayerGroup);

            // Ładowanie Avatara z Twojego folderu
            const loader = new GLTFLoader();
            loader.load('./models/avatar/scene.gltf', (gltf) => {
                const avatar = gltf.scene;
                avatar.scale.set(1, 1, 1); // Dostosuj jeśli za duży/mały
                avatar.position.y = -1; // Środek modelu a podłoga
                avatar.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                remotePlayerGroup.add(avatar);
                remoteAvatarLoaded = true;
            });
        }

        function handleNetworkData(data) {
            if(data.type === 'init') {
                setupRemotePlayer(data.nick);
                // Host wysyła swoje bloki nowemu graczowi
                if(!isHost && data.blocks) {
                    data.blocks.forEach(b => placeBlock(new THREE.Vector3(b.x, b.y, b.z), false));
                }
            }
            if(data.type === 'move' && remoteAvatarLoaded) {
                // Płynna interpolacja pozycji drugiego gracza
                remotePlayerGroup.position.set(data.x, data.y, data.z);
                remotePlayerGroup.rotation.y = data.rotY;
            }
            if(data.type === 'build') {
                placeBlock(new THREE.Vector3(data.x, data.y, data.z), false);
            }
        }

        function startGame() {
            uiMenu.style.display = 'none';
            uiHud.style.display = 'block';
            uiCrosshair.style.display = 'block';
            controls.lock();
            // Wyślij swój nick od razu po starcie
            if(conn && conn.open) conn.send({ type: 'init', nick: myNick, blocks: builtBlocksNetwork });
        }

        // --- Logika UI ---
        document.getElementById('btn-create').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value || "Host";
            peer = new Peer(); // Generuje losowe ID
            statusMsg.innerText = "Trwa generowanie serwera...";
            
            peer.on('open', (id) => {
                document.getElementById('btn-create').classList.add('hidden');
                document.getElementById('code-container').classList.remove('hidden');
                document.getElementById('my-code-display').innerText = id;
                statusMsg.innerText = "Oczekiwanie na gracza...";
                isHost = true;
            });

            peer.on('connection', (connection) => {
                conn = connection;
                statusMsg.innerText = "Gracz połączony! Możesz zacząć grę.";
                conn.on('data', handleNetworkData);
            });
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value || "Klient";
            const code = document.getElementById('join-code-input').value.trim();
            if(!code) return alert("Podaj kod!");
            
            peer = new Peer();
            statusMsg.innerText = "Łączenie z serwerem...";
            
            peer.on('open', () => {
                conn = peer.connect(code);
                conn.on('open', () => {
                    statusMsg.innerText = "Połączono! Zaczynamy...";
                    conn.on('data', handleNetworkData);
                    setTimeout(startGame, 1000); // Automatyczny start dla klienta
                });
                conn.on('error', (err) => { statusMsg.innerText = "Błąd połączenia!"; });
            });
        });

        document.getElementById('btn-start-host').addEventListener('click', startGame);

        // --- 5. BUDOWANIE (RAYCASTER) ---
        const raycaster = new THREE.Raycaster();
        const blockGeo = new THREE.BoxGeometry(2, 2, 2);
        const blockMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
        const builtBlocksNetwork = []; // Do wysyłania mapy nowym graczom

        function placeBlock(position, sendToNetwork = true) {
            const block = new THREE.Mesh(blockGeo, blockMat);
            block.position.copy(position);
            block.castShadow = true; block.receiveShadow = true;
            addSolidObject(block); // Dodaje kolizję

            if(sendToNetwork) {
                builtBlocksNetwork.push({x: position.x, y: position.y, z: position.z});
                if (conn && conn.open) conn.send({ type: 'build', x: position.x, y: position.y, z: position.z });
            }
        }

        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked || e.button !== 0) return;
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(buildableSurfaces, false);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                const pos = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(1));
                // Przyciąganie do siatki 2x2x2
                pos.x = Math.floor(pos.x / 2) * 2 + 1;
                pos.y = Math.floor(pos.y / 2) * 2 + 1;
                pos.z = Math.floor(pos.z / 2) * 2 + 1;
                placeBlock(pos, true);
            }
        });

        // --- 6. STEROWANIE, FIZYKA I KOLIZJE ---
        const controls = new PointerLockControls(camera, document.body);
        controls.addEventListener('unlock', () => {
            uiMenu.style.display = 'flex'; uiHud.style.display = 'none'; uiCrosshair.style.display = 'none';
        });

        camera.position.set(0, 2, 5);
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let moveF = false, moveB = false, moveL = false, moveR = false, canJump = false;

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveF = true; break;
                case 'KeyS': moveB = true; break;
                case 'KeyA': moveL = true; break;
                case 'KeyD': moveR = true; break;
                case 'Space': if(canJump){ velocity.y += 12; canJump = false; } break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveF = false; break;
                case 'KeyS': moveB = false; break;
                case 'KeyA': moveL = false; break;
                case 'KeyD': moveR = false; break;
            }
        });

        const clock = new THREE.Clock();
        const playerBox = new THREE.Box3();

        // Sprawdzanie kolizji
        function checkCollision(predictedPosition) {
            // Box gracza: szerokość 1, wysokość 2, głębokość 1
            playerBox.setFromCenterAndSize(
                new THREE.Vector3(predictedPosition.x, predictedPosition.y - 1, predictedPosition.z),
                new THREE.Vector3(1, 2, 1)
            );
            for(let box of collidableObjects) {
                if(playerBox.intersectsBox(box)) return true; // Jest kolizja
            }
            return false;
        }

        // --- 7. PĘTLA GRY ---
        let lastSendTime = 0;
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Obliczanie prędkości
                direction.z = Number(moveF) - Number(moveB);
                direction.x = Number(moveR) - Number(moveL);
                direction.normalize();

                velocity.x -= velocity.x * 10.0 * delta; // Hamowanie
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 30.0 * delta; // Grawitacja

                if (moveF || moveB) velocity.z -= direction.z * 50.0 * delta;
                if (moveL || moveR) velocity.x -= direction.x * 50.0 * delta;

                const currPos = controls.getObject().position.clone();

                // Test kolizji dla osi X
                const nextPosX = currPos.clone();
                nextPosX.x += (velocity.x * delta) * -1; // -1 bo PointerLock dziala specyficznie
                if(!checkCollision(nextPosX)) {
                    controls.moveRight(-velocity.x * delta);
                } else { velocity.x = 0; }

                // Test kolizji dla osi Z
                const nextPosZ = controls.getObject().position.clone();
                nextPosZ.z += (velocity.z * delta) * -1;
                if(!checkCollision(nextPosZ)) {
                    controls.moveForward(-velocity.z * delta);
                } else { velocity.z = 0; }

                // Aktualizacja osi Y (Grawitacja / Skok)
                controls.getObject().position.y += velocity.y * delta;
                
                // Kolizja z podłogą
                if (controls.getObject().position.y < 2) {
                    velocity.y = 0;
                    controls.getObject().position.y = 2; // Wysokość wzroku
                    canJump = true;
                }

                // Wysyłanie pozycji do drugiego gracza (co ok. 100ms żeby nie zapchać łącza)
                if (conn && conn.open && performance.now() - lastSendTime > 50) {
                    const pos = controls.getObject().position;
                    // Obrót wokół osi Y zależy od kamery (yaw)
                    const rotY = camera.rotation.y; 
                    conn.send({ type: 'move', x: pos.x, y: pos.y, z: pos.z, rotY: rotY });
                    lastSendTime = performance.now();
                }
            }
            
            // Żeby nick nad głową drugiego gracza zawsze patrzył w naszą stronę
            if(remotePlayerNickSprite) {
                remotePlayerNickSprite.quaternion.copy(camera.quaternion);
            }

            renderer.render(scene, camera);
        }

        // Responsywność
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
