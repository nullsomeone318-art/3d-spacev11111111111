<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epika 3D - Żyjący Świat & Multi (Zoptymalizowane)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: rgba(0, 255, 255, 0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none;
            box-shadow: 0 0 10px #00ffff;
        }

        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(10, 10, 20, 0.9); backdrop-filter: blur(10px); color: #00ffff; z-index: 200;
        }

        .panel {
            background: rgba(0,0,0,0.6); padding: 20px; border: 1px solid #00ffff;
            border-radius: 10px; text-align: center; margin: 10px; box-shadow: 0 0 20px rgba(0,255,255,0.2);
            width: 320px;
        }

        .panels-container { display: flex; flex-wrap: wrap; justify-content: center; }

        input { padding: 10px; font-size: 14px; margin: 10px 0; background: #111; border: 1px solid #00ffff; color: white; text-align: center; width: 85%; border-radius: 5px; }
        #join-code-input { text-transform: uppercase; font-size: 20px; font-weight: bold; letter-spacing: 2px; }

        button { padding: 12px 20px; font-size: 16px; background: transparent; color: #00ffff; border: 2px solid #00ffff; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.2s; margin-top: 5px; width: 100%; font-weight: bold; }
        button:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }
        
        /* Styl dla przycisku wznowienia gry */
        #btn-resume { background: #00ffff; color: #000; font-size: 20px; padding: 15px; }
        #btn-resume:hover { background: #fff; box-shadow: 0 0 25px #fff; border-color: #fff;}

        #my-code-display { font-size: 32px; color: #ff00ff; font-weight: bold; margin: 10px 0; user-select: text; background: #222; padding: 15px; border-radius: 5px; letter-spacing: 4px;}
        .hidden { display: none !important; }
        
        #hud { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-left: 3px solid #00ffff; z-index: 100; pointer-events: none; display: none; line-height: 1.5;}
        #music-status { position: absolute; top: 20px; right: 20px; color: #ff00ff; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px; border-right: 3px solid #ff00ff; z-index: 100; display: none; }
        #yt-player { position: absolute; top: -9999px; left: -9999px; } 
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="yt-player"></div>
    <div id="crosshair"></div>
    <div id="hud">
        <b>LPM</b>: Zbuduj | <b>PPM</b>: Zniszcz<br>
        <b>WSAD</b>: Ruch | <b>Shift</b>: Sprint | <b>Spacja</b>: Skok<br>
        <b>ESC</b>: Pauza / Menu
    </div>
    <div id="music-status">Muzyka: Brak</div>

    <div id="menu">
        <h1 style="margin-bottom: 5px; font-size: 3em; text-shadow: 0 0 20px #00ffff;">EPIKA 3D</h1>
        
        <div id="login-panels" style="display: flex; flex-direction: column; align-items: center;">
            <input type="text" id="my-nick" placeholder="TWÓJ NICK" value="Wędrowiec">
            <div class="panels-container">
                <div class="panel" id="host-panel">
                    <h3>STWÓRZ ŚWIAT</h3>
                    <button id="btn-create">Generuj Kod</button>
                    <div id="code-container" class="hidden">
                        <p style="font-size: 12px; color: #aaa;">Kod dla znajomych:</p>
                        <div id="my-code-display"></div>
                        <button id="btn-start-host">Wejdź do Świata</button>
                    </div>
                </div>

                <div class="panel" id="join-panel">
                    <h3>DOŁĄCZ DO GRY</h3>
                    <input type="text" id="join-code-input" placeholder="Wpisz kod (5 znaków)" maxlength="5"><br>
                    <button id="btn-join">Dołącz i Graj</button>
                </div>
            </div>
        </div>

        <div id="pause-panels" class="hidden" style="flex-direction: column; align-items: center;">
            <h2 style="color: #fff;">GRA ZAPAUZOWANA</h2>
            <div class="panels-container">
                <div class="panel">
                    <button id="btn-resume">WZNÓW GRĘ</button>
                </div>
                <div class="panel" style="border-color: #ff00ff; box-shadow: 0 0 20px rgba(255,0,255,0.2);">
                    <h3 style="color: #ff00ff;">ODTWARZACZ YT (DJ)</h3>
                    <input type="text" id="yt-url-input" placeholder="Wklej link YouTube"><br>
                    <button id="btn-play-music" style="border-color: #ff00ff; color: #ff00ff;">Graj dla wszystkich!</button>
                </div>
            </div>
        </div>
        
        <p id="status-msg" style="margin-top: 15px; color: #00ffff; font-weight: bold;"></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- YOUTUBE API ---
        let ytPlayer; let isYtReady = false;
        const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', { height: '10', width: '10', videoId: '', playerVars: { 'autoplay': 1, 'controls': 0 }, events: { 'onReady': () => { isYtReady = true; } } });
        };
        function getYouTubeID(url) { const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? match[2] : null; }

        // --- ZMIENNE GLOBALNE I SIECIOWE ---
        let peer = null, conn = null, myNick = "Wędrowiec", isHost = false;
        let isGameRunning = false; // Zapobiega pokazywaniu menu startowego
        
        let remotePlayerGroup = new THREE.Group(), remotePlayerNickSprite = null, remoteAvatarLoaded = false, remoteMixer = null;
        let remotePlayerExists = false; // Czy drugi gracz został już zainicjowany

        const uiMenu = document.getElementById('menu'), uiHud = document.getElementById('hud'), uiMusicStatus = document.getElementById('music-status');
        const uiCrosshair = document.getElementById('crosshair'), statusMsg = document.getElementById('status-msg');

        function generateShortCode() { const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let res = ''; for (let i=0; i<5; i++) res += chars.charAt(Math.floor(Math.random() * chars.length)); return res; }

        // --- SCENA 3D ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015); 
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444455, 0.6); scene.add(hemiLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.castShadow = true; sunLight.shadow.camera.near = 0.5; sunLight.shadow.camera.far = 500;
        sunLight.shadow.camera.left = -100; sunLight.shadow.camera.right = 100; sunLight.shadow.camera.top = 100; sunLight.shadow.camera.bottom = -100;
        scene.add(sunLight);

        // --- GENERATOR ŚWIATA (Stałe ziarno dla Multi) ---
        function mulberry32(a) { return function() { var t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; } }
        const seededRandom = mulberry32(9999);

        const collidableObjects = []; const buildableSurfaces = []; const mapSize = 1000;

        const floorGeo = new THREE.PlaneGeometry(mapSize, mapSize, 50, 50);
        const colors = [];
        for(let i=0; i<floorGeo.attributes.position.count; i++) {
            const x = floorGeo.attributes.position.getX(i), y = floorGeo.attributes.position.getY(i);
            const pathValue = Math.sin(x * 0.02) * Math.cos(y * 0.02);
            if(Math.abs(pathValue) < 0.15) { colors.push(0.5, 0.4, 0.2); } else { colors.push(0.1, 0.3 + seededRandom() * 0.2, 0.1); }
        }
        floorGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        const floorMesh = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1 }));
        floorMesh.rotation.x = -Math.PI / 2; floorMesh.receiveShadow = true; scene.add(floorMesh); buildableSurfaces.push(floorMesh);

        function addSolid(mesh) { scene.add(mesh); buildableSurfaces.push(mesh); mesh.updateMatrixWorld(); collidableObjects.push(new THREE.Box3().setFromObject(mesh)); }

        // Las i Skały
        const trunkGeo = new THREE.CylinderGeometry(0.5, 0.8, 4, 8); const leavesGeo = new THREE.ConeGeometry(3, 8, 8); const rockGeo = new THREE.DodecahedronGeometry(2, 1);
        const trunkMat = new THREE.MeshStandardMaterial({color: 0x4B3621}); const leavesMat = new THREE.MeshStandardMaterial({color: 0x228b22}); const rockMat = new THREE.MeshStandardMaterial({color: 0x777788});
        const interactableBlocks = [];

        for(let i=0; i<400; i++) {
            const px = (seededRandom() - 0.5) * (mapSize - 50), pz = (seededRandom() - 0.5) * (mapSize - 50);
            if(Math.abs(px) < 15 && Math.abs(pz) < 15) continue;
            if(seededRandom() > 0.2) {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(trunkGeo, trunkMat); trunk.position.y = 2; trunk.castShadow = true; trunk.receiveShadow = true;
                const leaves = new THREE.Mesh(leavesGeo, leavesMat); leaves.position.y = 7; leaves.castShadow = true; leaves.receiveShadow = true;
                tree.add(trunk); tree.add(leaves); tree.position.set(px, 0, pz);
                trunk.updateMatrixWorld(); const box = new THREE.Box3().setFromObject(trunk); box.applyMatrix4(new THREE.Matrix4().makeTranslation(px, 0, pz)); collidableObjects.push(box);
                scene.add(tree);
            } else {
                const rock = new THREE.Mesh(rockGeo, rockMat); rock.position.set(px, 1, pz); rock.scale.set(1+seededRandom(), 1+seededRandom(), 1+seededRandom()); rock.rotation.set(seededRandom()*Math.PI, seededRandom()*Math.PI, 0); rock.castShadow = true; rock.receiveShadow = true; addSolid(rock);
            }
        }

        // --- SYSTEM MULTIPLAYER ---
        function createTextSprite(msg) {
            const canvas = document.createElement('canvas'); const context = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64; context.font = "Bold 30px Arial"; context.fillStyle = "rgba(0,0,0,0.5)"; context.fillRect(0, 0, 256, 64);
            context.fillStyle = "#00ffff"; context.textAlign = "center"; context.fillText(msg, 128, 40);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) })); sprite.scale.set(5, 1.25, 1); return sprite;
        }

        function setupRemotePlayer(nick) {
            if (remotePlayerExists) return; // Zapobiega podwójnemu załadowaniu
            remotePlayerExists = true;

            remotePlayerNickSprite = createTextSprite(nick); remotePlayerNickSprite.position.y = 2.5;
            remotePlayerGroup.add(remotePlayerNickSprite); 
            scene.add(remotePlayerGroup);

            // 1. HOLOGRAM AWARYJNY (Zawsze widoczny, na wypadek gdyby model miał błąd)
            const fallbackMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1.2), new THREE.MeshBasicMaterial({color: 0xff00ff, wireframe: true}));
            fallbackMesh.position.y = 1;
            remotePlayerGroup.add(fallbackMesh);
            remoteAvatarLoaded = true; // Pozwala na poruszanie hologramem

            // 2. ŁADOWANIE PRAWDZIWEGO MODELU
            const loader = new GLTFLoader();
            loader.load('./models/avatar/scene.gltf', (gltf) => {
                const avatar = gltf.scene; avatar.scale.set(1, 1, 1); avatar.position.y = -1;
                avatar.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                
                // Gdy model się wczyta, usuwamy różowy hologram i wstawiamy avatara
                remotePlayerGroup.remove(fallbackMesh);
                remotePlayerGroup.add(avatar);
                
                if (gltf.animations && gltf.animations.length > 0) {
                    remoteMixer = new THREE.AnimationMixer(avatar);
                    remoteMixer.clipAction(gltf.animations[0]).play();
                }
            }, undefined, (err) => {
                console.warn("Nie można załadować modelu 3D. Przeglądarka zablokowała plik lub ścieżka jest zła. Używam Hologramu awaryjnego.", err);
            });
        }

        // --- OBSŁUGA SIECI (Wymiana "Uścisku Dłoni") ---
        function handleNetworkData(data) {
            if(data.type === 'init') {
                setupRemotePlayer(data.nick);
                // NAPRAWA BŁĘDU: Host musi odpowiedzieć swoim modelem i blokami, gdy nowy gracz dołączy!
                if(isHost) {
                    conn.send({ type: 'initReply', nick: myNick, blocks: builtBlocksNetwork });
                }
            }
            if(data.type === 'initReply') {
                setupRemotePlayer(data.nick);
                if(data.blocks) data.blocks.forEach(b => placeBlock(new THREE.Vector3(b.x, b.y, b.z), false, b.id));
            }
            if(data.type === 'move' && remoteAvatarLoaded) { remotePlayerGroup.position.set(data.x, data.y, data.z); remotePlayerGroup.rotation.y = data.rotY; }
            if(data.type === 'build') { placeBlock(new THREE.Vector3(data.x, data.y, data.z), false, data.id); }
            if(data.type === 'destroy') { removeBlockById(data.id, false); }
            if(data.type === 'music' && isYtReady && ytPlayer.loadVideoById) { ytPlayer.loadVideoById(data.videoId); uiMusicStatus.innerText = "Muzyka: Odtwarzanie..."; }
        }

        // --- ZARZĄDZANIE MENU I STANEM GRY ---
        function enterWorld() {
            isGameRunning = true;
            uiMenu.style.display = 'none';
            // Ukrywamy startowe ekrany, pokazujemy pauzę na zapas
            document.getElementById('login-panels').style.display = 'none';
            document.getElementById('pause-panels').style.display = 'flex';
            
            uiHud.style.display = 'block';
            uiMusicStatus.style.display = 'block';
            uiCrosshair.style.display = 'block';
            controls.lock();

            // Powiedz innemu graczowi (jeśli już tu jest), że dołączyłeś
            if(conn && conn.open) conn.send({ type: 'init', nick: myNick });
        }

        // Host tworzy świat
        document.getElementById('btn-create').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value || "Host";
            const shortCode = generateShortCode(); peer = new Peer(shortCode); 
            statusMsg.innerText = "Trwa generowanie serwera...";
            peer.on('open', (id) => {
                document.getElementById('btn-create').classList.add('hidden'); document.getElementById('code-container').classList.remove('hidden');
                document.getElementById('my-code-display').innerText = id; statusMsg.innerText = "Oczekiwanie na gracza..."; isHost = true;
            });
            peer.on('connection', (connection) => { 
                conn = connection; statusMsg.innerText = "Gracz połączony!"; 
                conn.on('data', handleNetworkData); 
            });
        });

        // Klient dołącza
        document.getElementById('btn-join').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value || "Klient";
            const code = document.getElementById('join-code-input').value.trim().toUpperCase();
            if(code.length !== 5) return;
            peer = new Peer(); statusMsg.innerText = "Łączenie...";
            peer.on('open', () => {
                conn = peer.connect(code);
                conn.on('open', () => { 
                    statusMsg.innerText = "Połączono!"; 
                    conn.on('data', handleNetworkData); 
                    setTimeout(enterWorld, 500); // Automatycznie wejdź do gry
                });
            });
        });

        document.getElementById('btn-start-host').addEventListener('click', enterWorld);
        
        // NOWOŚĆ: Przycisk wznawiania gry w Menu Pauzy
        document.getElementById('btn-resume').addEventListener('click', () => {
            uiMenu.style.display = 'none';
            controls.lock();
        });

        document.getElementById('btn-play-music').addEventListener('click', () => {
            const id = getYouTubeID(document.getElementById('yt-url-input').value);
            if(id) {
                if(isYtReady) ytPlayer.loadVideoById(id); uiMusicStatus.innerText = "Muzyka: Twój wybór!";
                if(conn && conn.open) conn.send({ type: 'music', videoId: id });
                controls.lock(); // Wróć automatycznie do gry po włączeniu nuty
            } else alert("Zły link!");
        });

        // --- BUDOWANIE I NISZCZENIE ---
        const raycaster = new THREE.Raycaster();
        const blockGeo = new THREE.BoxGeometry(2, 2, 2);
        const blockMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
        const builtBlocksNetwork = [];

        function placeBlock(position, sendToNetwork = true, id = Math.random().toString(36).substr(2, 9)) {
            const block = new THREE.Mesh(blockGeo, blockMat); block.position.copy(position); block.castShadow = true; block.receiveShadow = true;
            block.userData = { id: id, isBlock: true }; scene.add(block); buildableSurfaces.push(block); interactableBlocks.push(block);
            block.updateMatrixWorld(); collidableObjects.push(new THREE.Box3().setFromObject(block));
            if(sendToNetwork) {
                builtBlocksNetwork.push({x: position.x, y: position.y, z: position.z, id: id});
                if (conn && conn.open) conn.send({ type: 'build', x: position.x, y: position.y, z: position.z, id: id });
            }
        }

        function removeBlockById(id, sendToNetwork = true) {
            const index = interactableBlocks.findIndex(b => b.userData.id === id);
            if(index !== -1) {
                const block = interactableBlocks[index]; scene.remove(block); interactableBlocks.splice(index, 1);
                if(sendToNetwork && conn && conn.open) conn.send({ type: 'destroy', id: id });
            }
        }

        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            if (e.button === 0) { // LPM
                const intersects = raycaster.intersectObjects(buildableSurfaces, false);
                if (intersects.length > 0) {
                    const i = intersects[0]; const pos = i.point.clone().add(i.face.normal.clone().multiplyScalar(1));
                    pos.x = Math.floor(pos.x/2)*2+1; pos.y = Math.floor(pos.y/2)*2+1; pos.z = Math.floor(pos.z/2)*2+1;
                    const newBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(1.9, 1.9, 1.9));
                    const playerBox = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(controls.getObject().position.x, controls.getObject().position.y - 1, controls.getObject().position.z), new THREE.Vector3(1, 2, 1));
                    if (!newBox.intersectsBox(playerBox)) placeBlock(pos, true);
                }
            } else if (e.button === 2) { // PPM
                const intersects = raycaster.intersectObjects(interactableBlocks, false);
                if (intersects.length > 0) removeBlockById(intersects[0].object.userData.id, true);
            }
        });

        // --- STEROWANIE & FIZYKA ---
        const controls = new PointerLockControls(camera, document.body);
        
        // NAPRAWA ESCAPE: Pokazuje Menu Pauzy zamiast wywalać na początek
        controls.addEventListener('unlock', () => { 
            if (isGameRunning) {
                uiMenu.style.display = 'flex'; // To teraz pokaże PANELE PAUZY
            }
        });
        
        camera.position.set(0, 2, 0);
        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let moveF = false, moveB = false, moveL = false, moveR = false, canJump = false, isSprinting = false;

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': moveF = true; break; case 'KeyS': moveB = true; break;
                case 'KeyA': moveL = true; break; case 'KeyD': moveR = true; break;
                case 'ShiftLeft': isSprinting = true; break;
                case 'Space': if(canJump && controls.isLocked){ velocity.y += 15; canJump = false; } break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': moveF = false; break; case 'KeyS': moveB = false; break;
                case 'KeyA': moveL = false; break; case 'KeyD': moveR = false; break;
                case 'ShiftLeft': isSprinting = false; break;
            }
        });

        const playerBox = new THREE.Box3();
        function checkCol(p) {
            playerBox.setFromCenterAndSize(new THREE.Vector3(p.x, p.y - 1, p.z), new THREE.Vector3(1, 2, 1));
            if(p.x > mapSize/2 || p.x < -mapSize/2 || p.z > mapSize/2 || p.z < -mapSize/2) return true;
            for(let box of collidableObjects) if(playerBox.intersectsBox(box)) return true;
            return false;
        }

        // --- PĘTLA GRY ---
        const clock = new THREE.Clock(); let lastSendTime = 0, walkTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); // Zabezpieczenie przed lagspike'ami

            if (remoteMixer) remoteMixer.update(delta);

            if (controls.isLocked) {
                direction.z = Number(moveF) - Number(moveB); direction.x = Number(moveR) - Number(moveL); direction.normalize();
                const speedMult = isSprinting ? 80.0 : 40.0;
                
                if((moveF||moveB||moveL||moveR) && canJump) {
                    walkTime += delta * (isSprinting ? 15 : 10);
                    camera.position.y = 2 + Math.sin(walkTime) * 0.15;
                } else camera.position.y = THREE.MathUtils.lerp(camera.position.y, 2, 0.1);

                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta; velocity.y -= 40.0 * delta; 
                if (moveF || moveB) velocity.z -= direction.z * speedMult * delta;
                if (moveL || moveR) velocity.x -= direction.x * speedMult * delta;

                const currPos = controls.getObject().position;
                const nextX = currPos.clone(); nextX.x -= velocity.x * delta;
                if(!checkCol(nextX)) controls.moveRight(-velocity.x * delta); else velocity.x = 0;

                const nextZ = currPos.clone(); nextZ.z -= velocity.z * delta;
                if(!checkCol(nextZ)) controls.moveForward(-velocity.z * delta); else velocity.z = 0;

                currPos.y += velocity.y * delta;
                if (currPos.y < 2) { velocity.y = 0; currPos.y = 2; canJump = true; }

                if (conn && conn.open && performance.now() - lastSendTime > 50) {
                    conn.send({ type: 'move', x: currPos.x, y: currPos.y, z: currPos.z, rotY: camera.rotation.y });
                    lastSendTime = performance.now();
                }
            }
            
            if(remotePlayerNickSprite) remotePlayerNickSprite.quaternion.copy(camera.quaternion);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
