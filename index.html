<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epika 3D - The Backrooms (HD)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255, 255, 255, 0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; display: none; box-shadow: 0 0 10px #ffffff; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px); color: #e6c86e; z-index: 200; }
        .panel { background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #e6c86e; border-radius: 10px; text-align: center; margin: 10px; box-shadow: 0 0 20px rgba(230,200,110,0.1); width: 320px; }
        .panels-container { display: flex; flex-wrap: wrap; justify-content: center; }
        input { padding: 10px; font-size: 14px; margin: 10px 0; background: #111; border: 1px solid #e6c86e; color: white; text-align: center; width: 85%; border-radius: 5px; }
        #join-code-input { text-transform: uppercase; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        button { padding: 12px 20px; font-size: 16px; background: transparent; color: #e6c86e; border: 2px solid #e6c86e; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.2s; margin-top: 5px; width: 100%; font-weight: bold; }
        button:hover { background: #e6c86e; color: #000; box-shadow: 0 0 15px #e6c86e; }
        #btn-resume { background: #e6c86e; color: #000; font-size: 20px; padding: 15px; }
        #my-code-display { font-size: 32px; color: #ff3333; font-weight: bold; margin: 10px 0; user-select: text; background: #222; padding: 15px; border-radius: 5px; letter-spacing: 4px;}
        .hidden { display: none !important; }
        #hud { position: absolute; bottom: 20px; left: 20px; color: #ccc; background: rgba(0,0,0,0.8); padding: 10px; border-left: 3px solid #e6c86e; z-index: 100; pointer-events: none; display: none; line-height: 1.5; font-family: monospace;}
        #music-status { position: absolute; top: 20px; right: 20px; color: #ff3333; font-weight: bold; background: rgba(0,0,0,0.8); padding: 10px; border-right: 3px solid #ff3333; z-index: 100; display: none; }
        #yt-player { position: absolute; top: -9999px; left: -9999px; } 
        
        /* Efekt zakłóceń dla klimatu */
        .vhs-text { text-shadow: 2px 0 red, -2px 0 blue; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="yt-player"></div>
    <div id="crosshair"></div>
    <div id="hud">
        <b>F</b>: Latarka (Wkrótce)<br>
        <b>LPM</b>: Postaw Marker | <b>PPM</b>: Usuń<br>
        <b>WSAD</b>: Ruch | <b>Shift</b>: Bieg
    </div>
    <div id="music-status">Kaseta: Pusta</div>

    <div id="menu">
        <h1 class="vhs-text" style="margin-bottom: 5px; font-size: 4em;">LEVEL 0</h1>
        <p style="color: #888; margin-bottom: 30px;">Nie zgub się...</p>
        
        <div id="login-panels" style="display: flex; flex-direction: column; align-items: center;">
            <input type="text" id="my-nick" placeholder="OBIEKT_TESTOWY_01" value="Wędrowiec">
            <div class="panels-container">
                <div class="panel" id="host-panel">
                    <h3>ZAŁÓŻ LOBBY</h3>
                    <button id="btn-create">Generuj Kod</button>
                    <div id="code-container" class="hidden">
                        <p style="font-size: 12px; color: #aaa;">Kod dla grupy:</p>
                        <div id="my-code-display"></div>
                        <button id="btn-start-host">Rozpocznij Zejście</button>
                    </div>
                </div>
                <div class="panel" id="join-panel">
                    <h3>DOŁĄCZ DO GRUPY</h3>
                    <input type="text" id="join-code-input" placeholder="Wpisz kod (5 znaków)" maxlength="5"><br>
                    <button id="btn-join">Dołącz</button>
                </div>
            </div>
        </div>

        <div id="pause-panels" class="hidden" style="flex-direction: column; align-items: center;">
            <h2 class="vhs-text" style="color: #fff;">PAUZA</h2>
            <div class="panels-container">
                <div class="panel"><button id="btn-resume">WZNÓW</button></div>
                <div class="panel" style="border-color: #ff3333;">
                    <h3 style="color: #ff3333;">ODTWARZACZ KASETY (YT)</h3>
                    <input type="text" id="yt-url-input" placeholder="Wklej link YouTube"><br>
                    <button id="btn-play-music" style="border-color: #ff3333; color: #ff3333;">Odtwórz w radiowęźle</button>
                </div>
            </div>
        </div>
        <p id="status-msg" style="margin-top: 15px; color: #ff3333; font-weight: bold;"></p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- YOUTUBE API ---
        let ytPlayer; let isYtReady = false;
        const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', { height: '10', width: '10', videoId: '', playerVars: { 'autoplay': 1, 'controls': 0 }, events: { 'onReady': () => { isYtReady = true; } } });
        };
        function getYouTubeID(url) { const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? match[2] : null; }

        let peer = null, conn = null, myNick = "Wędrowiec", isHost = false, isGameRunning = false;
        let remotePlayerGroup = new THREE.Group(), remotePlayerNickSprite = null, remoteAvatarLoaded = false, remoteMixer = null, remotePlayerExists = false;
        const uiMenu = document.getElementById('menu'), uiHud = document.getElementById('hud'), uiMusicStatus = document.getElementById('music-status');
        const uiCrosshair = document.getElementById('crosshair'), statusMsg = document.getElementById('status-msg');
        function generateShortCode() { const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let res = ''; for (let i=0; i<5; i++) res += chars.charAt(Math.floor(Math.random() * chars.length)); return res; }

        // --- SCENA 3D I ULEPSZONY RENDERER (HD TEXTURES) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a05); // Bardzo ciemne, żółtawe tło w razie wyjścia poza mapę
        scene.fog = new THREE.FogExp2(0x1a1a12, 0.02); // Gęsta, ciemna mgła ukrywająca końce korytarzy
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        
        // NOWOŚĆ: Ustawienia HD dla Tekstur i Kolorów
        renderer.outputColorSpace = THREE.SRGBColorSpace; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.8; // Zmniejszona ekspozycja dla mrocznego klimatu
        document.body.appendChild(renderer.domElement);

        // --- OŚWIETLENIE KLIMATYCZNE (Mroczne jarzeniówki) ---
        const ambientLight = new THREE.AmbientLight(0xfff5b5, 0.1); // Bardzo słabe, żółtawe światło
        scene.add(ambientLight);

        // LATARKA GRACZA (Przyczepiona do kamery)
        const flashLight = new THREE.SpotLight(0xffffff, 2, 30, Math.PI/4, 0.5, 1);
        flashLight.position.set(0, 0, 0);
        flashLight.target.position.set(0, 0, -1);
        flashLight.castShadow = true;
        camera.add(flashLight);
        camera.add(flashLight.target);
        scene.add(camera); // Ważne, żeby kamera z latarką była w scenie

        // --- ŁADOWANIE MAPY BACKROOMS ---
        const mapColliders = []; // Zamiast Box3, przechowujemy oryginalne siatki (meshes) mapy do nowej fizyki
        const buildableSurfaces = []; 

        const loader = new GLTFLoader();
        
        // Ładujemy Twoje środowisko z nowego folderu
        loader.load('./models/backrooms/scene.gltf', (gltf) => {
            const backroomsMap = gltf.scene;
            
            backroomsMap.traverse((node) => {
                if (node.isMesh) {
                    node.receiveShadow = true;
                    node.castShadow = true;
                    // Jeśli materiał jest zbyt błyszczący w Backroomsach, zmniejszamy roughness
                    if(node.material) {
                        node.material.roughness = 0.9; 
                    }
                    mapColliders.push(node); // Dodajemy do systemu zderzeń ze ścianami!
                    buildableSurfaces.push(node);
                }
            });
            
            // Poprawiamy ewentualne złe pozycje modelu mapy
            backroomsMap.position.set(0, 0, 0); 
            scene.add(backroomsMap);
            console.log("HD Map Loaded: Backrooms");
        }, undefined, (error) => {
            console.error("Błąd ładowania mapy Backrooms! Sprawdź ścieżkę i wielkość liter na GitHubie.", error);
            statusMsg.innerText = "Błąd ładowania mapy Backrooms!";
        });

        // --- AWARYJNA PODŁOGA (Jeśli wyjdziesz poza mapę) ---
        const floorGeo = new THREE.PlaneGeometry(500, 500);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const floorMesh = new THREE.Mesh(floorGeo, floorMat);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.position.y = -0.5; // Lekko pod mapą
        scene.add(floorMesh);
        mapColliders.push(floorMesh);
        buildableSurfaces.push(floorMesh);

        // --- SYSTEM MULTIPLAYER ---
        function createTextSprite(msg) {
            const canvas = document.createElement('canvas'); const context = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64; context.font = "Bold 30px Arial"; context.fillStyle = "rgba(0,0,0,0.5)"; context.fillRect(0, 0, 256, 64);
            context.fillStyle = "#ff0000"; context.textAlign = "center"; context.fillText(msg, 128, 40);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) })); sprite.scale.set(5, 1.25, 1); return sprite;
        }

        function setupRemotePlayer(nick) {
            if (remotePlayerExists) return; remotePlayerExists = true;
            remotePlayerNickSprite = createTextSprite(nick); remotePlayerNickSprite.position.y = 2.5;
            remotePlayerGroup.add(remotePlayerNickSprite); scene.add(remotePlayerGroup);

            // Dodajemy małe światło do drugiego gracza, żeby było go widać w ciemności
            const remoteLight = new THREE.PointLight(0xffaa00, 1, 10);
            remoteLight.position.y = 1;
            remotePlayerGroup.add(remoteLight);

            const fallbackMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1.2), new THREE.MeshBasicMaterial({color: 0xff0000, wireframe: true}));
            fallbackMesh.position.y = 1; remotePlayerGroup.add(fallbackMesh); remoteAvatarLoaded = true;

            loader.load('./models/avatar/scene.gltf', (gltf) => {
                const avatar = gltf.scene; avatar.scale.set(1, 1, 1); avatar.position.y = 0; // Poprawiona wysokość Avatara
                avatar.traverse(n => { if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
                remotePlayerGroup.remove(fallbackMesh); remotePlayerGroup.add(avatar);
                if (gltf.animations && gltf.animations.length > 0) { remoteMixer = new THREE.AnimationMixer(avatar); remoteMixer.clipAction(gltf.animations[0]).play(); }
            }, undefined, (err) => { console.warn("Model błąd.", err); });
        }

        function handleNetworkData(data) {
            if(data.type === 'init') { setupRemotePlayer(data.nick); if(isHost) conn.send({ type: 'initReply', nick: myNick, blocks: builtBlocksNetwork }); }
            if(data.type === 'initReply') { setupRemotePlayer(data.nick); if(data.blocks) data.blocks.forEach(b => placeBlock(new THREE.Vector3(b.x, b.y, b.z), false, b.id)); }
            if(data.type === 'move' && remoteAvatarLoaded) { remotePlayerGroup.position.set(data.x, data.y, data.z); remotePlayerGroup.rotation.y = data.rotY; }
            if(data.type === 'build') { placeBlock(new THREE.Vector3(data.x, data.y, data.z), false, data.id); }
            if(data.type === 'destroy') { removeBlockById(data.id, false); }
            if(data.type === 'music' && isYtReady && ytPlayer.loadVideoById) { ytPlayer.loadVideoById(data.videoId); uiMusicStatus.innerText = "Radiowęzeł Nadaje"; }
        }

        function enterWorld() {
            isGameRunning = true; uiMenu.style.display = 'none';
            document.getElementById('login-panels').style.display = 'none'; document.getElementById('pause-panels').style.display = 'flex';
            uiHud.style.display = 'block'; uiMusicStatus.style.display = 'block'; uiCrosshair.style.display = 'block'; controls.lock();
            if(conn && conn.open) conn.send({ type: 'init', nick: myNick });
        }

        document.getElementById('btn-create').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value || "Host";
            peer = new Peer(generateShortCode()); statusMsg.innerText = "Nawiązywanie połączenia...";
            peer.on('open', (id) => { document.getElementById('btn-create').classList.add('hidden'); document.getElementById('code-container').classList.remove('hidden'); document.getElementById('my-code-display').innerText = id; statusMsg.innerText = "Oczekiwanie na dołączenie..."; isHost = true; });
            peer.on('connection', (c) => { conn = c; statusMsg.innerText = "Zsynchronizowano!"; conn.on('data', handleNetworkData); });
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            myNick = document.getElementById('my-nick').value || "Klient";
            const code = document.getElementById('join-code-input').value.trim().toUpperCase(); if(code.length !== 5) return;
            peer = new Peer(); statusMsg.innerText = "Łączenie z sygnałem...";
            peer.on('open', () => { conn = peer.connect(code); conn.on('open', () => { statusMsg.innerText = "Połączono!"; conn.on('data', handleNetworkData); setTimeout(enterWorld, 500); }); });
        });

        document.getElementById('btn-start-host').addEventListener('click', enterWorld);
        document.getElementById('btn-resume').addEventListener('click', () => { uiMenu.style.display = 'none'; controls.lock(); });
        document.getElementById('btn-play-music').addEventListener('click', () => {
            const id = getYouTubeID(document.getElementById('yt-url-input').value);
            if(id) { if(isYtReady) ytPlayer.loadVideoById(id); uiMusicStatus.innerText = "Radiowęzeł: Twoja Kaseta"; if(conn && conn.open) conn.send({ type: 'music', videoId: id }); controls.lock(); } else alert("Zły link!");
        });

        // --- SYSTEM "MARKERÓW" (Zamiast klocków budujemy np. ślady w Backrooms) ---
        const raycaster = new THREE.Raycaster();
        const blockGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5); // Małe znaczniki
        const blockMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 }); 
        const interactableBlocks = [];
        const builtBlocksNetwork = [];

        function placeBlock(position, sendToNetwork = true, id = Math.random().toString(36).substr(2, 9)) {
            const block = new THREE.Mesh(blockGeo, blockMat); block.position.copy(position); block.castShadow = true; block.receiveShadow = true;
            block.userData = { id: id, isBlock: true }; scene.add(block); interactableBlocks.push(block);
            if(sendToNetwork) { builtBlocksNetwork.push({x: position.x, y: position.y, z: position.z, id: id}); if (conn && conn.open) conn.send({ type: 'build', x: position.x, y: position.y, z: position.z, id: id }); }
        }

        function removeBlockById(id, sendToNetwork = true) {
            const index = interactableBlocks.findIndex(b => b.userData.id === id);
            if(index !== -1) { scene.remove(interactableBlocks[index]); interactableBlocks.splice(index, 1); if(sendToNetwork && conn && conn.open) conn.send({ type: 'destroy', id: id }); }
        }

        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            if (e.button === 0) { 
                const intersects = raycaster.intersectObjects(buildableSurfaces, false);
                if (intersects.length > 0) {
                    const i = intersects[0]; const pos = i.point.clone().add(i.face.normal.clone().multiplyScalar(0.25));
                    placeBlock(pos, true);
                }
            } else if (e.button === 2) { 
                const intersects = raycaster.intersectObjects(interactableBlocks, false);
                if (intersects.length > 0) removeBlockById(intersects[0].object.userData.id, true);
            }
        });

        // --- STEROWANIE ---
        const controls = new PointerLockControls(camera, document.body);
        controls.addEventListener('unlock', () => { if (isGameRunning) uiMenu.style.display = 'flex'; });
        camera.position.set(0, 2, 0); // Startowa pozycja - upewnij się, że Twoja mapa Backrooms ma tu podłogę!

        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        let moveF = false, moveB = false, moveL = false, moveR = false, isSprinting = false;

        document.addEventListener('keydown', (e) => {
            switch(e.code) { case 'KeyW': moveF = true; break; case 'KeyS': moveB = true; break; case 'KeyA': moveL = true; break; case 'KeyD': moveR = true; break; case 'ShiftLeft': isSprinting = true; break;}
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) { case 'KeyW': moveF = false; break; case 'KeyS': moveB = false; break; case 'KeyA': moveL = false; break; case 'KeyD': moveR = false; break; case 'ShiftLeft': isSprinting = false; break; }
        });

        // --- NOWA FIZYKA (RAYCAST COLLISION) DLA WGRANYCH MAP ---
        const moveRaycaster = new THREE.Raycaster();
        const collisionDistance = 0.6; // Jak blisko ściany możesz podejść

        function checkWallCollision(dir) {
            // Strzelamy promieniem z klatki piersiowej gracza w stronę ruchu
            const origin = camera.position.clone();
            origin.y -= 0.5; 
            
            // Konwertujemy kierunek ruchu gracza (np. W = przód) na realny kąt kamery
            const rotationMatrix = new THREE.Matrix4().extractRotation(camera.matrix);
            const moveDirection = dir.clone().applyMatrix4(rotationMatrix).normalize();

            moveRaycaster.set(origin, moveDirection);
            // Wykrywamy ściany mapy Backrooms
            const intersects = moveRaycaster.intersectObjects(mapColliders, false);
            
            if (intersects.length > 0 && intersects[0].distance < collisionDistance) {
                return true; // Jest ściana przed nami!
            }
            return false;
        }

        // --- PĘTLA GRY ---
        const clock = new THREE.Clock(); let lastSendTime = 0, walkTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (remoteMixer) remoteMixer.update(delta);

            if (controls.isLocked) {
                direction.z = Number(moveF) - Number(moveB); direction.x = Number(moveR) - Number(moveL); direction.normalize();
                const speedMult = isSprinting ? 25.0 : 12.0; // W backroomsach chodzi się wolniej, straszniej
                
                if(moveF||moveB||moveL||moveR) { 
                    walkTime += delta * (isSprinting ? 12 : 8); 
                    camera.position.y = 2 + Math.sin(walkTime) * 0.08; // Headbobbing
                } else {
                    camera.position.y = THREE.MathUtils.lerp(camera.position.y, 2, 0.1);
                }

                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta;
                if (moveF || moveB) velocity.z -= direction.z * speedMult * delta;
                if (moveL || moveR) velocity.x -= direction.x * speedMult * delta;

                // --- TESTOWANIE NOWEJ KOLIZJI ZE ŚCIANAMI ---
                if (velocity.x !== 0 || velocity.z !== 0) {
                    const moveVec = new THREE.Vector3(velocity.x * delta, 0, velocity.z * delta);
                    
                    // Sprawdzamy samą oś Z (Przód/Tył)
                    if(!checkWallCollision(new THREE.Vector3(0, 0, Math.sign(velocity.z)))) {
                        controls.moveForward(-velocity.z * delta);
                    } else {
                        velocity.z = 0; // Uderzenie w ścianę
                    }

                    // Sprawdzamy samą oś X (Prawo/Lewo)
                    if(!checkWallCollision(new THREE.Vector3(Math.sign(velocity.x), 0, 0))) {
                        controls.moveRight(-velocity.x * delta);
                    } else {
                        velocity.x = 0; // Uderzenie w ścianę
                    }
                }

                // Spadanie / Utrzymanie wysokości
                const floorRay = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0));
                const floorIntersects = floorRay.intersectObjects(mapColliders, false);
                if(floorIntersects.length > 0) {
                    const distToFloor = floorIntersects[0].distance;
                    if(distToFloor < 2) camera.position.y += (2 - distToFloor); // Schody/Górki
                    else if (distToFloor > 2.5) camera.position.y -= 5 * delta; // Spadek
                }

                if (conn && conn.open && performance.now() - lastSendTime > 50) {
                    conn.send({ type: 'move', x: camera.position.x, y: camera.position.y, z: camera.position.z, rotY: camera.rotation.y }); lastSendTime = performance.now();
                }
            }
            if(remotePlayerNickSprite) remotePlayerNickSprite.quaternion.copy(camera.quaternion);
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
